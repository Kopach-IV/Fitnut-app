<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FitNut App</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --bg: #0f0f0f; --card: #1e1e1e; --primary: #bb86fc; --text: #ffffff; }
        body { font-family: sans-serif; background: var(--bg); color: var(--text); padding: 20px; text-align: center; }
        .step { display: none; }
        .active { display: block; }
        .option-card { background: var(--card); padding: 20px; margin: 15px 0; border-radius: 12px; border: 1px solid #333; cursor: pointer; }
        input { width: 100%; padding: 15px; background: #252525; border: 1px solid #444; color: white; border-radius: 10px; margin-bottom: 15px; box-sizing: border-box; }
        .main-btn { background: var(--primary); color: black; border: none; padding: 15px; width: 100%; border-radius: 10px; font-weight: bold; }
    </style>
</head>
<body>

    <div id="step1" class="step active">
        <h1>Выберите цель:</h1>
        <div class="option-card" onclick="setGoal('Похудение')">🔥 Похудение</div>
        <div class="option-card" onclick="setGoal('Рельеф')">💎 Рельеф</div>
        <div class="option-card" onclick="setGoal('Масса')">💪 Набор массы</div>
    </div>

    <div id="step2" class="step">
        <h1>Ваши параметры:</h1>
        <input type="number" id="weight" placeholder="Вес (кг)" inputmode="decimal">
        <input type="number" id="height" placeholder="Рост (см)" inputmode="decimal">
        <button id="finalBtn" class="main-btn" onclick="sendToBot()">ЗАВЕРШИТЬ АНАЛИЗ ✨</button>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();

        let goal = "";

        function setGoal(selectedGoal) {
            goal = selectedGoal;
            document.getElementById('step1').classList.remove('active');
            document.getElementById('step2').classList.add('active');
        }

        function sendToBot() {
            const w = document.getElementById('weight').value;
            const h = document.getElementById('height').value;

            if (w && h) {
                const data = { goal: goal, weight: w, height: h };
                
                // Отправляем данные (работает только для KeyboardButton)
                tg.sendData(JSON.stringify(data));
                
                // Принудительно закрываем окно
                tg.close();
            } else {
                tg.showAlert("Заполните все поля!");
            }
        }
    </script>
</body>
</html>
