<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Fitnut App by Nata</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        /* Палитра: Глубокий черный и Розовый неон */
        :root {
            --bg-color: #0c0c0e;
            --secondary-bg: #1c1c1e;
            --accent-pink: #ff2d55; /* Сочный розовый */
            --accent-glow: rgba(255, 45, 85, 0.4);
            --text-main: #ffffff;
            --text-dim: #ebebf5;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
        }

        .container {
            padding: 50px 20px;
            text-align: center;
            flex: 1;
        }

        h1 { 
            font-size: 32px; 
            margin-bottom: 15px; 
            color: var(--accent-pink); 
            font-weight: 900;
            letter-spacing: -1px;
            text-transform: uppercase;
        }
        
        p { font-size: 17px; opacity: 0.9; line-height: 1.5; color: var(--text-dim); }

        /* AI-Чат Кнопка (Пузырь) */
        #chat-bubble {
            position: fixed;
            bottom: 30px;
            right: 25px;
            width: 65px;
            height: 65px;
            background: var(--accent-pink);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 30px;
            box-shadow: 0 0 20px var(--accent-glow);
            cursor: pointer;
            z-index: 999;
            transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        #chat-bubble:active { transform: scale(0.85); }

        /* Окно чата */
        #chat-window {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--bg-color);
            display: none;
            flex-direction: column;
            z-index: 1000;
        }

        .chat-header {
            padding: 20px;
            background: var(--secondary-bg);
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #333;
        }

        .chat-header span { color: var(--accent-pink); font-weight: 800; font-size: 18px; }

        .close-btn { 
            background: none; 
            border: none; 
            color: var(--text-dim); 
            font-size: 16px; 
            font-weight: 500; 
            cursor: pointer; 
        }

        #chat-messages {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 15px;
            background: radial-gradient(circle at bottom, #1a050a 0%, #0c0c0e 100%);
        }

        .msg { padding: 12px 18px; border-radius: 20px; max-width: 80%; font-size: 15px; line-height: 1.4; }
        .bot { background: var(--secondary-bg); align-self: flex-start; color: white; border-left: 3px solid var(--accent-pink); }
        .user { background: var(--accent-pink); align-self: flex-end; color: white; font-weight: 500; }

        .chat-input-area {
            padding: 20px;
            background: var(--secondary-bg);
            display: flex;
            gap: 12px;
            padding-bottom: 45px;
            border-top: 1px solid #333;
        }

        #user-input {
            flex: 1;
            background: var(--bg-color);
            border: 1px solid #444;
            border-radius: 25px;
            padding: 12px 20px;
            color: white;
            outline: none;
            font-size: 16px;
        }
        #user-input:focus { border-color: var(--accent-pink); }

        #send-btn { background: none; border: none; color: var(--accent-pink); font-size: 28px; cursor: pointer; }
    </style>
</head>
<body>

    <div class="container">
        <h1>FITNUT CLUB</h1>
        <p>Добро пожаловать в пространство твоей трансформации.<br><br>Наташа и AI-ассистент уже ждут тебя.</p>
    </div>

    <div id="chat-bubble" onclick="toggleChat()">💬</div>

    <div id="chat-window">
        <div class="chat-header">
            <span>Nata AI-Assistant</span>
            <button class="close-btn" onclick="toggleChat()">Закрыть</button>
        </div>
        <div id="chat-messages">
            <div class="msg bot">Привет! ✨ Я твой личный проводник в мире фитнеса. С чего начнем нашу работу сегодня?</div>
        </div>
        <div class="chat-input-area">
            <input type="text" id="user-input" placeholder="Твой вопрос..." onkeypress="checkEnter(event)">
            <button id="send-btn" onclick="sendMessage()">➔</button>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();

        // Настройка цветов темы самого Telegram (верхняя полоска)
        tg.setHeaderColor('#1c1c1e');
        tg.setBackgroundColor('#0c0c0e');

        function toggleChat() {
            const chat = document.getElementById('chat-window');
            if (chat.style.display === 'flex') {
                chat.style.display = 'none';
            } else {
                chat.style.display = 'flex';
                document.getElementById('user-input').focus();
            }
        }

        function checkEnter(e) {
            if (e.key === 'Enter') sendMessage();
        }

        function sendMessage() {
            const input = document.getElementById('user-input');
            const container = document.getElementById('chat-messages');
            const text = input.value.trim();

            if (!text) return;

            const userDiv = document.createElement('div');
            userDiv.className = 'msg user';
            userDiv.textContent = text;
            container.appendChild(userDiv);

            input.value = '';
            container.scrollTop = container.scrollHeight;

            setTimeout(() => {
                const botDiv = document.createElement('div');
                botDiv.className = 'msg bot';
                botDiv.textContent = "Готовлю для тебя профессиональный ответ... Ожидай нашу базу знаний! ✨";
                container.appendChild(botDiv);
                container.scrollTop = container.scrollHeight;
            }, 700);
        }
    </script>
</body>
</html>
