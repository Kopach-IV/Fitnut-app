<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FITNUT APP</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        /* Полный сброс и фиксация черного цвета */
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        html, body {
            background-color: #000000 !important;
            margin: 0;
            padding: 0;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            color: #ffffff;
            font-family: -apple-system, system-ui, sans-serif;
        }

        /* Фиксированная шапка */
        .app-header {
            position: fixed;
            top: 0;
            width: 100%;
            height: 60px;
            background-color: #000000;
            display: flex;
            align-items: center;
            justify-content: center;
            border-bottom: 1px solid #1c1c1e;
            z-index: 1000;
        }

        h1 {
            color: #ff2d55; /* Та самая фуксия */
            font-size: 20px;
            text-transform: uppercase;
            font-weight: 900;
            margin: 0;
            letter-spacing: 1px;
        }

        /* Контейнер для страниц с отступом под шапку и таб-бар */
        .page-container {
            margin-top: 60px;
            height: calc(100vh - 135px);
            overflow-y: auto;
            padding: 20px;
        }

        .page { display: none; }
        .page.active { display: block; }

        /* Карточки и кнопки */
        .card {
            background: #1c1c1e;
            border-radius: 15px;
            padding: 15px;
            margin-bottom: 15px;
            border: 1px solid #2c2c2e;
        }

        .btn-survey {
            background: #ff2d55;
            color: white;
            border: none;
            border-radius: 12px;
            padding: 15px;
            width: 100%;
            font-weight: bold;
            font-size: 14px;
            margin-bottom: 20px;
            text-transform: uppercase;
        }

        /* Чат */
        .chat-box { height: 200px; overflow-y: auto; display: flex; flex-direction: column; gap: 8px; margin-bottom: 10px; }
        .msg { padding: 10px 14px; border-radius: 15px; max-width: 85%; font-size: 14px; line-height: 1.4; }
        .bot { background: #2c2c2e; align-self: flex-start; border-left: 3px solid #ff2d55; }
        .user { background: #ff2d55; align-self: flex-end; }
        
        .chat-input { display: flex; gap: 8px; }
        .chat-input input { flex: 1; background: #000; border: 1px solid #333; border-radius: 10px; padding: 10px; color: white; outline: none; }

        /* Сетка контента */
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .grid-item { background: #1c1c1e; border-radius: 10px; height: 100px; display: flex; align-items: center; justify-content: center; font-size: 24px; border: 1px solid #2c2c2e; }

        /* Нижний Таб-бар */
        .tab-bar {
            position: fixed;
            bottom: 0;
            width: 100%;
            height: 75px;
            background: #0c0c0e;
            border-top: 1px solid #333;
            display: flex;
            justify-content: space-around;
            align-items: center;
            padding-bottom: 20px;
            z-index: 1000;
        }

        .tab-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            color: #888;
            font-size: 10px;
            flex: 1;
        }

        .tab-item.active { color: #ff2d55; }
        .tab-icon { font-size: 20px; margin-bottom: 4px; }
    </style>
</head>
<body>

    <div class="app-header">
        <h1 id="header-title">FITNUT MAIN</h1>
    </div>

    <div class="page-container">
        <div id="home" class="page active">
            <button class="btn-survey">ПРОЙТИ АНКЕТИРОВАНИЕ 📋</button>
            <div class="card">
                <div id="chat-messages" class="chat-box">
                    <div class="msg bot">Привет! Я Ната-AI. Пройди анкету или спроси меня о чем угодно! ✨</div>
                </div>
                <div class="chat-input">
                    <input type="text" id="user-input" placeholder="Вопрос...">
                    <button style="background:none; border:none; color:#ff2d55; font-size:20px;" onclick="sendMessage()">➔</button>
                </div>
            </div>
        </div>

        <div id="workouts" class="page">
            <div class="grid">
                <div class="grid-item">🔥</div>
                <div class="grid-item">🍑</div>
            </div>
        </div>

        <div id="nutrition" class="page">
            <div class="grid">
                <div class="grid-item">🥗</div>
                <div class="grid-item">🥞</div>
            </div>
        </div>

        <div id="profile" class="page">
            <div class="card">
                <b id="user-name">Клиент</b>
                <div style="display:flex; justify-content:space-between; margin-top:15px;">
                    <div><span style="color:#ff2d55; font-weight:bold;">65.2</span><br><small>Вес</small></div>
                    <div><span style="color:#ff2d55; font-weight:bold;">14</span><br><small>Трен</small></div>
                    <div><span style="color:#ff2d55; font-weight:bold;">-2.1</span><br><small>Кг</small></div>
                </div>
            </div>
        </div>
    </div>

    <div class="tab-bar">
        <div class="tab-item active" onclick="showPage('home', 'FITNUT MAIN', this)">
            <span class="tab-icon">🏠</span><span>Главная</span>
        </div>
        <div class="tab-item" onclick="showPage('workouts', 'ТРЕНИРОВКИ', this)">
            <span class="tab-icon">🏋️</span><span>Клуб</span>
        </div>
        <div class="tab-item" onclick="showPage('nutrition', 'ПИТАНИЕ', this)">
            <span class="tab-icon">🥗</span><span>Меню</span>
        </div>
        <div class="tab-item" onclick="showPage('profile', 'ПРОФИЛЬ', this)">
            <span class="tab-icon">👤</span><span>Я</span>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        
        function init() {
            tg.ready();
            tg.expand();
            tg.setHeaderColor('#000000');
            tg.setBackgroundColor('#000000');
            
            if (tg.initDataUnsafe && tg.initDataUnsafe.user) {
                document.getElementById('user-name').textContent = tg.initDataUnsafe.user.first_name;
            }
        }

        function showPage(pageId, title, el) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.tab-item').forEach(t => t.classList.remove('active'));
            document.getElementById(pageId).classList.add('active');
            el.classList.add('active');
            document.getElementById('header-title').textContent = title;
            tg.HapticFeedback.impactOccurred('light');
        }

        function sendMessage() {
            const input = document.getElementById('user-input');
            const text = input.value.trim();
            if (!text) return;
            const msgDiv = document.createElement('div');
            msgDiv.className = 'msg user';
            msgDiv.textContent = text;
            document.getElementById('chat-messages').appendChild(msgDiv);
            input.value = '';
            document.getElementById('chat-messages').scrollTop = 9999;
        }

        init();
    </script>
</body>
</html>
