<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FITNUT BY NATA</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        /* Базовая фиксация стилей, чтобы не было белого экрана */
        html, body {
            background: #000000 !important;
            color: #ffffff !important;
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        /* Шапка */
        .header {
            position: fixed;
            top: 0;
            width: 100%;
            height: 60px;
            background: #000000;
            display: flex;
            align-items: center;
            justify-content: center;
            border-bottom: 1px solid #1c1c1e;
            z-index: 100;
        }

        .header h1 {
            color: #ff2d55;
            font-size: 18px;
            font-weight: 900;
            letter-spacing: 2px;
            margin: 0;
            text-transform: uppercase;
        }

        /* Контент */
        .content {
            margin-top: 60px;
            height: calc(100vh - 135px);
            overflow-y: auto;
            padding: 20px;
            box-sizing: border-box;
        }

        .page { display: none; }
        .page.active { display: block; }

        .pink-text { color: #ff2d55; text-transform: uppercase; font-weight: 800; }

        /* Карточки */
        .card {
            background: #1c1c1e;
            border-radius: 18px;
            padding: 20px;
            margin-bottom: 15px;
            border: 1px solid #2c2c2e;
        }

        /* Кнопка */
        .btn-main {
            background: linear-gradient(45deg, #ff2d55, #ff5e7d);
            color: white;
            border: none;
            border-radius: 14px;
            padding: 16px;
            width: 100%;
            font-weight: 900;
            font-size: 13px;
            text-transform: uppercase;
            margin-bottom: 20px;
            box-shadow: 0 4px 15px rgba(255, 45, 85, 0.3);
        }

        /* Навигация */
        .nav {
            position: fixed;
            bottom: 0;
            width: 100%;
            height: 75px;
            background: #000000;
            border-top: 1px solid #1c1c1e;
            display: flex;
            justify-content: space-around;
            padding-bottom: 20px;
            z-index: 100;
        }

        .nav-item {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: #555;
            font-size: 10px;
            transition: 0.3s;
        }

        .nav-item.active { color: #ff2d55; }
        .nav-icon { font-size: 20px; margin-bottom: 4px; }

        /* Чат */
        .chat-display { height: 200px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; margin-bottom: 10px; }
        .m-bot { background: #2c2c2e; padding: 10px; border-radius: 15px; align-self: flex-start; max-width: 85%; font-size: 14px; border-left: 3px solid #ff2d55; }
        .m-user { background: #ff2d55; padding: 10px; border-radius: 15px; align-self: flex-end; max-width: 85%; font-size: 14px; }
        
        .chat-input-wrap { display: flex; gap: 10px; border: 1px solid #333; border-radius: 10px; padding: 5px 10px; background: #000; }
        .chat-input-wrap input { flex: 1; background: none; border: none; color: white; padding: 8px; outline: none; }
    </style>
</head>
<body>

    <div class="header">
        <h1 id="title">RECEPTION</h1>
    </div>

    <div class="content">
        <div id="p-home" class="page active">
            <div style="text-align: center; margin-bottom: 20px;">
                <span class="pink-text" style="font-size: 22px;">Fitness&Nutrition</span><br>
                <span style="opacity: 0.6;">by Nata</span>
            </div>
            
            <button class="btn-main" onclick="tg.HapticFeedback.notificationOccurred('success')">Пройти анкетирование 📋</button>
            
            <div class="card">
                <div class="pink-text" style="font-size: 12px; margin-bottom: 10px;">AI-Консультант</div>
                <div id="chat" class="chat-display">
                    <div class="m-bot">Добро пожаловать в клуб! Задай мне любой вопрос. ✨</div>
                </div>
                <div class="chat-input-area">
                    <div class="chat-input-wrap">
                        <input type="text" id="inp" placeholder="Ваш вопрос...">
                        <button onclick="send()" style="background:none; border:none; color:#ff2d55; font-size:20px;">➔</button>
                    </div>
                </div>
            </div>
        </div>

        <div id="p-club" class="page"><div class="card">🏋️ Раздел тренировок скоро будет здесь.</div></div>
        <div id="p-menu" class="page"><div class="card">🥗 Вкусные рецепты уже готовятся.</div></div>
        <div id="p-me" class="page"><div class="card">👤 Твой прогресс и статистика.</div></div>
    </div>

    <div class="nav">
        <div class="nav-item active" onclick="go('p-home', 'RECEPTION', this)">
            <span class="nav-icon">🏠</span><span>Главная</span>
        </div>
        <div class="nav-item" onclick="go('p-club', 'КЛУБ', this)">
            <span class="nav-icon">🏋️</span><span>Клуб</span>
        </div>
        <div class="nav-item" onclick="go('p-menu', 'МЕНЮ', this)">
            <span class="nav-icon">🥗</span><span>Меню</span>
        </div>
        <div class="nav-item" onclick="go('p-me', 'ПРОФИЛЬ', this)">
            <span class="nav-icon">👤</span><span>Я</span>
        </div>
    </div>

    <script>
        // Инициализация
        const tg = window.Telegram.WebApp;
        
        function setup() {
            try {
                tg.ready();
                tg.expand();
                tg.setHeaderColor('#000000');
                tg.setBackgroundColor('#000000');
            } catch (e) {
                console.error("Telegram WebApp not found");
            }
        }

        function go(id, title, el) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            el.classList.add('active');
            document.getElementById('title').innerText = title;
            if(window.Telegram) tg.HapticFeedback.impactOccurred('light');
        }

        function send() {
            const i = document.getElementById('inp');
            const c = document.getElementById('chat');
            if(!i.value) return;
            const u = document.createElement('div');
            u.className = 'm-user';
            u.innerText = i.value;
            c.appendChild(u);
            i.value = '';
            c.scrollTop = c.scrollHeight;
        }

        setup();
    </script>
</body>
</html>
