<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FitNut Questionnaire</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --bg-color: #0f0f0f;
            --card-bg: #1e1e1e;
            --primary: #bb86fc;
            --text: #ffffff;
        }
        body {
            font-family: sans-serif;
            background-color: var(--bg-color);
            color: var(--text);
            margin: 0;
            padding: 20px;
            text-align: center;
        }
        .step { display: none; }
        .active { display: block; }
        .option-card {
            background: var(--card-bg);
            padding: 20px;
            margin: 15px 0;
            border-radius: 12px;
            border: 1px solid #333;
            cursor: pointer;
        }
        input {
            width: 100%;
            padding: 15px;
            background: #252525;
            border: 1px solid #444;
            color: white;
            border-radius: 10px;
            margin-bottom: 15px;
            font-size: 16px;
            box-sizing: border-box;
        }
        .main-btn {
            background: var(--primary);
            color: black;
            border: none;
            padding: 15px;
            width: 100%;
            border-radius: 10px;
            font-weight: bold;
            font-size: 18px;
        }
        .main-btn:active { opacity: 0.7; }
    </style>
</head>
<body>

    <div id="step1" class="step active">
        <h1>Выберите цель:</h1>
        <div class="option-card" onclick="setGoal('Похудение')">🔥 Похудение</div>
        <div class="option-card" onclick="setGoal('Рельеф')">💎 Рельеф</div>
        <div class="option-card" onclick="setGoal('Масса')">💪 Набор массы</div>
    </div>

    <div id="step2" class="step">
        <h1>Ваши данные:</h1>
        <input type="number" id="weight" placeholder="Ваш вес (кг)" inputmode="decimal">
        <input type="number" id="height" placeholder="Ваш рост (см)" inputmode="decimal">
        <button id="finalBtn" class="main-btn" onclick="sendToBot()">ЗАВЕРШИТЬ АНАЛИЗ ✨</button>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();

        let goal = "";

        function setGoal(selectedGoal) {
            goal = selectedGoal;
            document.getElementById('step1').classList.remove('active');
            document.getElementById('step2').classList.add('active');
        }

        function sendToBot() {
            const weight = document.getElementById('weight').value;
            const height = document.getElementById('height').value;
            const btn = document.getElementById('finalBtn');

            if (weight && height) {
                // Визуальный отклик
                btn.innerText = "ОТПРАВКА...";
                btn.style.backgroundColor = "#03dac6";

                const data = {
                    goal: goal,
                    weight: weight,
                    height: height
                };

                // Команда на закрытие и отправку
                tg.sendData(JSON.stringify(data));
            } else {
                tg.showAlert("Пожалуйста, заполните все поля!");
            }
        }
    </script>
</body>
</html>
