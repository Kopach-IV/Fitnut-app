<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FitNut</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --bg: #0f0f0f; --card: #1e1e1e; --primary: #bb86fc; --text: #ffffff; }
        body { font-family: sans-serif; background: var(--bg); color: var(--text); padding: 20px; text-align: center; }
        .step { display: none; }
        .active { display: block; }
        .option-card { background: var(--card); padding: 20px; margin: 10px 0; border-radius: 12px; border: 1px solid #333; }
        input { width: 100%; padding: 15px; margin: 10px 0; background: #252525; border: 1px solid #444; color: white; border-radius: 10px; box-sizing: border-box; }
        .main-btn { background: var(--primary); color: black; border: none; padding: 15px; width: 100%; border-radius: 10px; font-weight: bold; margin-top: 10px; }
    </style>
</head>
<body>

    <div id="step1" class="step active">
        <h2>Выберите цель:</h2>
        <div class="option-card" onclick="nextStep('Похудение')">🔥 Похудение</div>
        <div class="option-card" onclick="nextStep('Рельеф')">💎 Рельеф</div>
        <div class="option-card" onclick="nextStep('Масса')">💪 Набор массы</div>
    </div>

    <div id="step2" class="step">
        <h2>Ваши параметры:</h2>
        <input type="number" id="weight" placeholder="Вес (кг)" inputmode="decimal">
        <input type="number" id="height" placeholder="Рост (см)" inputmode="decimal">
        <button class="main-btn" onclick="sendDataToBot()">ЗАВЕРШИТЬ АНАЛИЗ ✨</button>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();
        
        let selectedGoal = '';

        function nextStep(goal) {
            selectedGoal = goal;
            document.getElementById('step1').classList.remove('active');
            document.getElementById('step2').classList.add('active');
        }

        function sendDataToBot() {
            const w = document.getElementById('weight').value;
            const h = document.getElementById('height').value;

            if (w && h) {
                const result = {
                    goal: selectedGoal,
                    weight: w,
                    height: h
                };
                // Отправляем данные боту (ВАЖНО: это закрывает Mini App автоматически)
                tg.sendData(JSON.stringify(result));
            } else {
                tg.showAlert("Пожалуйста, заполните вес и рост!");
            }
        }
    </script>
</body>
</html>
