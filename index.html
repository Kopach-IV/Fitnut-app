<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Fitnut App by Nata</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --tg-theme-bg-color: #1c1c1e;
            --tg-theme-text-color: #ffffff;
            --tg-theme-button-color: #007AFF;
            --tg-theme-button-text-color: #ffffff;
            --tg-theme-secondary-bg-color: #2c2c2e;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--tg-theme-bg-color);
            color: var(--tg-theme-text-color);
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        .container {
            padding: 20px;
            width: 100%;
            box-sizing: border-box;
            text-align: center;
        }

        h1 { font-size: 24px; margin-bottom: 10px; color: var(--tg-theme-button-color); }
        p { font-size: 16px; opacity: 0.8; line-height: 1.5; }

        /* Стили AI-Чата */
        #chat-bubble {
            position: fixed;
            bottom: 25px;
            right: 25px;
            width: 60px;
            height: 60px;
            background: var(--tg-theme-button-color);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.4);
            cursor: pointer;
            z-index: 9999;
            transition: transform 0.2s ease;
        }
        #chat-bubble:active { transform: scale(0.9); }

        #chat-window {
            position: fixed;
            bottom: 95px;
            right: 20px;
            left: 20px;
            height: 70vh;
            background: var(--tg-theme-secondary-bg-color);
            border-radius: 20px;
            display: none;
            flex-direction: column;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            z-index: 10000;
            border: 1px solid #333;
            overflow: hidden;
        }

        .chat-header {
            padding: 15px;
            background: #3a3a3c;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-weight: bold;
        }

        .close-btn { background: none; border: none; color: white; font-size: 24px; cursor: pointer; }

        #chat-messages {
            flex: 1;
            padding: 15px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .msg { padding: 10px 14px; border-radius: 15px; max-width: 85%; font-size: 15px; line-height: 1.4; }
        .bot { background: #48484a; align-self: flex-start; border-bottom-left-radius: 2px; }
        .user { background: var(--tg-theme-button-color); align-self: flex-end; border-bottom-right-radius: 2px; }

        .chat-input-area {
            padding: 15px;
            background: #2c2c2e;
            display: flex;
            gap: 10px;
            border-top: 1px solid #3d3d3f;
        }

        #user-input {
            flex: 1;
            background: #1c1c1e;
            border: 1px solid #444;
            border-radius: 20px;
            padding: 10px 15px;
            color: white;
            outline: none;
            font-size: 16px;
        }

        #send-btn { background: none; border: none; color: var(--tg-theme-button-color); font-size: 24px; cursor: pointer; }

        .hidden { display: none; }
    </style>
</head>
<body>

    <div class="container">
        <h1>FITNUT CLUB</h1>
        <p>Добро пожаловать в пространство твоей трансформации.<br>Наташа и AI-ассистент уже ждут тебя.</p>
        </div>

    <div id="chat-bubble" onclick="toggleChat()">💬</div>

    <div id="chat-window">
        <div class="chat-header">
            <span>Ната AI-Тренер</span>
            <button class="close-btn" onclick="toggleChat()">×</button>
        </div>
        <div id="chat-messages">
            <div class="msg bot">Привет! Я твой личный AI-наставник. Задай любой вопрос по тренировкам, питанию или работе клуба! 🚀</div>
        </div>
        <div class="chat-input-area">
            <input type="text" id="user-input" placeholder="Ваш вопрос..." onkeypress="checkEnter(event)">
            <button id="send-btn" onclick="sendMessage()">➔</button>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand(); // Расширяем на весь экран

        function toggleChat() {
            const chat = document.getElementById('chat-window');
            const isHidden = chat.style.display === 'none' || chat.style.display === '';
            chat.style.display = isHidden ? 'flex' : 'none';
            if (isHidden) document.getElementById('user-input').focus();
        }

        function checkEnter(e) {
            if (e.key === 'Enter') sendMessage();
        }

        function sendMessage() {
            const input = document.getElementById('user-input');
            const container = document.getElementById('chat-messages');
            const text = input.value.trim();

            if (!text) return;

            // Добавляем сообщение пользователя
            const userDiv = document.createElement('div');
            userDiv.className = 'msg user';
            userDiv.textContent = text;
            container.appendChild(userDiv);

            input.value = '';
            container.scrollTop = container.scrollHeight;

            // Имитация ответа (пока не подключим OpenAI)
            setTimeout(() => {
                const botDiv = document.createElement('div');
                botDiv.className = 'msg bot';
                botDiv.textContent = "Я тебя поняла! Сейчас проанализирую твой вопрос с точки зрения методики Наташи... ⏳";
                container.appendChild(botDiv);
                container.scrollTop = container.scrollHeight;
            }, 800);
        }

        // Сообщаем Telegram, что приложение готово
        tg.ready();
    </script>
</body>
</html>
